<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life RPG</title>

<style>
body { font-family: sans-serif; background:#111; color:#eee; padding:10px; }
button { margin:5px; padding:8px; cursor:pointer; }
input[type="text"], input[type="number"] { width:60px; margin:3px; }
.card { border:1px solid #444; padding:10px; margin:5px 0; }
.hidden { display:none; }
textarea { width:100%; height:120px; background:#000; color:#0f0; }
.log { font-size:12px; border-bottom:1px solid #333; padding:5px; }
.quest-done { text-decoration: line-through; color: #888; }
</style>
</head>

<body>

<h1>Life RPG</h1>

<button onclick="showPage(1)">스탯</button>
<button onclick="showPage(2)">몬스터</button>
<button onclick="showPage(3)">퀘스트</button>
<button onclick="showPage(4)">로그</button>

<!-- ===== 1 스탯 ===== -->
<div id="page1">
<h2>스탯</h2>
<div class="card">
HP <input id="hp" type="number"><br>
MP <input id="mp" type="number"><br>
STR <input id="str" type="number">
DEX <input id="dex" type="number">
STA <input id="sta" type="number"><br>
KNW <input id="knw" type="number">
INS <input id="ins" type="number">
ACT <input id="act" type="number">
DEF <input id="def" type="number">
</div>

<h2>정수</h2>
<div class="card">
<textarea readonly>
정수 - 튜터
제3의 관점에서 나를 바라보며
상상 속 걔와 스파링을 시켜주는 몬스터.
(패시브) - ???
(액티브) : DFWYA - 나에게 잔소리와 호통을 친다. 

정수 - 게이머
주어진 상황을 객관적으로 바라보고 최적의 조건을 탐색하는 설계자
(패시브) : 플레이어 시점 - 정신 공격 계열에 모든 면역 보너스를 얻는다.
(액티브) : 승부욕 - 설정한 적과 함께 랜덤필드로 이동하며, 한 명이 죽을 때까지 필드는 유지된다</textarea>
</div>
</div>

<!-- ===== 2 몬스터 ===== -->
<div id="page2" class="hidden">
<h2>몬스터</h2>
<div id="monsterList"></div>

<h3>활성 몬스터</h3>
<div id="activeMonsters"></div>
</div>

<!-- ===== 3 퀘스트 ===== -->
<div id="page3" class="hidden">
<h2>퀘스트</h2>
<div id="questList"></div>

EXP: <span id="exp">0</span><br>
LEVEL: <span id="level">1</span>
</div>

<!-- ===== 4 로그 ===== -->
<div id="page4" class="hidden">
<h2>로그</h2>
<div id="logList"></div>
</div>

<br>
<button onclick="save()">저장</button>

<script>

const baseMonsters = [
  {name:"비교 망령", desc:"비교", counter:"절대지표"},
  {name:"완벽주의 골렘", desc:"완벽주의", counter:"60%"},
  {name:"회피형 고블린", desc:"회피", counter:"5분"},
  {name:"과부하 오크", desc:"과부하", counter:"3개"},
  {name:"피로 흡혈귀", desc:"피로", counter:"휴식"}
];

const questNames = [
  "한점 집중 사용",
  "근원 재설계 1개",
  "정수 사용",
  "출석 3회"
];

let data = {
  activeMonsters: [],   // 이제 name 문자열만 저장
  exp: 0,
  level: 1,
  questDone: [false, false, false, false],
  questDate: "",        // 퀘스트 마지막 초기화 날짜
  logs: [],
  stats: { hp:"", mp:"", str:"", dex:"", sta:"", knw:"", ins:"", act:"", def:"" }
};

/* ─── 날짜 유틸 ─── */
function todayStr() {
  return new Date().toLocaleDateString("ko-KR");
}

function checkDailyReset() {
  const today = todayStr();
  if (data.questDate !== today) {
    data.questDone = [false, false, false, false];
    data.questDate = today;
    addLog("하루가 지나 퀘스트가 초기화되었습니다.");
  }
}

/* ─── 로그 ─── */
function now() {
  return new Date().toLocaleString("ko-KR");
}

function addLog(text) {
  data.logs.unshift(`[${now()}] ${text}`);
  renderLogs();
}

/* ─── 페이지 전환 ─── */
function showPage(n) {
  for (let i = 1; i <= 4; i++) {
    document.getElementById("page" + i).classList.add("hidden");
  }
  document.getElementById("page" + n).classList.remove("hidden");
}

/* ─── 몬스터 ─── */
function spawn(i) {
  const monsterName = baseMonsters[i].name;  // 이름(문자열)만 저장
  data.activeMonsters.push(monsterName);
  addLog(`${monsterName} 등장`);
  renderActive();
}

function kill(i) {
  const monsterName = data.activeMonsters[i];
  data.activeMonsters.splice(i, 1);
  addLog(`${monsterName} 처치`);
  renderActive();
}

function renderActive() {
  const c = document.getElementById("activeMonsters");
  c.innerHTML = "";
  data.activeMonsters.forEach((name, i) => {
    c.innerHTML += `
      <div class="card">
        ${name}
        <button onclick="kill(${i})">처치</button>
      </div>`;
  });
}

function renderMonsters() {
  const c = document.getElementById("monsterList");
  c.innerHTML = "";
  baseMonsters.forEach((m, i) => {
    c.innerHTML += `
      <div class="card">
        <strong>${m.name}</strong> — ${m.desc} / 대응: ${m.counter}
        <button onclick="spawn(${i})">등장</button>
      </div>`;
  });
}

/* ─── 퀘스트 ─── */
function completeQuest(i) {
  if (data.questDone[i]) return;   // 이미 완료된 퀘스트 무시

  data.questDone[i] = true;
  data.exp += 1;
  addLog(`퀘스트 "${questNames[i]}" 완료 (EXP +1)`);

  if (data.exp >= 20) {
    data.exp = 0;
    data.level += 1;
    addLog(`레벨업! Lv.${data.level}`);
  }

  renderQuests();
  updateUI();
  save();
}

function renderQuests() {
  const c = document.getElementById("questList");
  c.innerHTML = "";
  questNames.forEach((name, i) => {
    const done = data.questDone[i];
    c.innerHTML += `
      <div class="card ${done ? "quest-done" : ""}">
        <input type="checkbox" ${done ? "checked disabled" : `onchange="completeQuest(${i})"`}>
        ${name}
      </div>`;
  });
}

/* ─── 스탯 동기화 ─── */
const statIds = ["hp","mp","str","dex","sta","knw","ins","act","def"];

function syncStatsToData() {
  statIds.forEach(id => {
    data.stats[id] = document.getElementById(id).value;
  });
}

function loadStatsToUI() {
  statIds.forEach(id => {
    document.getElementById(id).value = data.stats[id] || "";
  });
}

/* ─── UI 업데이트 ─── */
function updateUI() {
  document.getElementById("exp").innerText = data.exp;
  document.getElementById("level").innerText = data.level;
}

function renderLogs() {
  const c = document.getElementById("logList");
  c.innerHTML = "";
  data.logs.forEach(l => {
    c.innerHTML += `<div class="log">${l}</div>`;
  });
}

/* ─── 저장 / 불러오기 ─── */
function save() {
  syncStatsToData();
  localStorage.setItem("lifeRPG", JSON.stringify(data));
  alert("저장됨");
}

function load() {
  const s = localStorage.getItem("lifeRPG");
  if (s) {
    const saved = JSON.parse(s);
    // 새 필드 안전하게 병합
    data = Object.assign(data, saved);
  }

  checkDailyReset();   // 불러온 뒤 날짜 체크

  renderMonsters();
  renderActive();
  renderQuests();
  renderLogs();
  loadStatsToUI();
  updateUI();
}

load();

</script>

</body>
</html>
