<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life RPG</title>

<style>
body { font-family: sans-serif; background:#111; color:#eee; padding:10px; }
button { margin:5px; padding:8px; }
input { width:60px; margin:3px; }
.card { border:1px solid #444; padding:10px; margin:5px 0; }
.hidden { display:none; }
textarea { width:100%; height:120px; background:#000; color:#0f0; }
.log { font-size:12px; border-bottom:1px solid #333; padding:5px; }
</style>
</head>

<body>

<h1>Life RPG</h1>

<button onclick="showPage(1)">스탯</button>
<button onclick="showPage(2)">몬스터</button>
<button onclick="showPage(3)">퀘스트</button>
<button onclick="showPage(4)">로그</button>

<!-- ===== 1 ===== -->
<div id="page1">
<h2>스탯</h2>
<div class="card">
HP <input id="hp"><br>
MP <input id="mp"><br>
STR <input id="str">
DEX <input id="dex">
STA <input id="sta"><br>
KNW <input id="knw">
INS <input id="ins">
ACT <input id="act">
DEF <input id="def">
</div>

<h2>정수</h2>
<div class="card">
<textarea readonly>
정수 - 튜터
제3의 관점에서 나를 바라보며
상상 속 걔와 스파링을 시켜주는 몬스터.
(패시브) - ???
(액티브) : DFWYA - 나에게 잔소리와 호통을 친다. 

정수 - 게이머
주어진 상황을 객관적으로 바라보고 최적의 조건을 탐색하는 설계자
(패시브) : 플레이어 시점 - 정신 공격 계열에 모든 면역 보너스를 얻는다.
(액티브) : 승부욕 - 설정한 적과 함께 랜덤필드로 이동하며, 한 명이 죽을 때까지 필드는 유지된다
</textarea>
</div>
</div>

<!-- ===== 2 ===== -->
<div id="page2" class="hidden">
<h2>몬스터</h2>
<div id="monsterList"></div>

<h3>활성 몬스터</h3>
<div id="activeMonsters"></div>
</div>

<!-- ===== 3 ===== -->
<div id="page3" class="hidden">
<h2>퀘스트</h2>

<div class="card">
<input type="checkbox" onchange="completeQuest(0)"> 한점 집중 사용
</div>
<div class="card">
<input type="checkbox" onchange="completeQuest(1)"> 근원 재설계 1개
</div>
<div class="card">
<input type="checkbox" onchange="completeQuest(2)"> 정수 사용
</div>
<div class="card">
<input type="checkbox" onchange="completeQuest(3)"> 출석 3회
</div>

EXP: <span id="exp">0</span><br>
LEVEL: <span id="level">1</span>
</div>

<!-- ===== 4 로그 ===== -->
<div id="page4" class="hidden">
<h2>로그</h2>
<div id="logList"></div>
</div>

<br>
<button onclick="save()">저장</button>

<script>

const baseMonsters = [
  {name:"비교 망령", desc:"비교", counter:"절대지표"},
  {name:"완벽주의 골렘", desc:"완벽주의", counter:"60%"},
  {name:"회피형", desc:"회피", counter:"5분"},
  {name:"과부하", desc:"과부하", counter:"3개"},
  {name:"피로", desc:"피로", counter:"휴식"}
];

let data = {
  activeMonsters:[],
  exp:0,
  level:1,
  questDone:[false,false,false,false],
  logs:[]
};

function now(){
  return new Date().toLocaleString();
}

function addLog(text){
  data.logs.unshift(`[${now()}] ${text}`);
  renderLogs();
}

function showPage(n){
  for(let i=1;i<=4;i++){
    document.getElementById("page"+i).classList.add("hidden");
  }
  document.getElementById("page"+n).classList.remove("hidden");
}

function spawn(i){
  let name = baseMonsters[i];
  data.activeMonsters.push(name);
  addLog(`${name} 등장`);
  renderActive();
}

function kill(i){
  let name = data.activeMonsters[i];
  data.activeMonsters.splice(i,1);
  addLog(`${name} 처치`);
  renderActive();
}

function renderActive(){
  let c = document.getElementById("activeMonsters");
  c.innerHTML="";
  data.activeMonsters.forEach((m,i)=>{
    c.innerHTML+=`
    <div class="card">
    ${m}
    <button onclick="kill(${i})">처치</button>
    </div>`;
  });
}

function renderMonsters(){
  let c = document.getElementById("monsterList");
  c.innerHTML="";
  baseMonsters.forEach((m,i)=>{
    c.innerHTML+=`
    <div class="card">
    ${m}
    <button onclick="spawn(${i})">등장</button>
    </div>`;
  });
}

function completeQuest(i){
  if(!data.questDone[i]){
    data.questDone[i]=true;
    data.exp+=1;
    addLog(`퀘스트 ${i+1} 완료 (EXP +1)`);

    if(data.exp>=20){
      data.exp=0;
      data.level+=1;
      addLog(`레벨업! Lv.${data.level}`);
    }

    updateUI();
  }
}

function renderLogs(){
  let c = document.getElementById("logList");
  c.innerHTML="";
  data.logs.forEach(l=>{
    c.innerHTML+=`<div class="log">${l}</div>`;
  });
}

function updateUI(){
  document.getElementById("exp").innerText=data.exp;
  document.getElementById("level").innerText=data.level;
}

function save(){
  localStorage.setItem("lifeRPG", JSON.stringify(data));
  alert("저장됨");
}

function load(){
  let s = localStorage.getItem("lifeRPG");
  if(s) data = JSON.parse(s);
  renderMonsters();
  renderActive();
  renderLogs();
  updateUI();
}

load();

</script>

</body>
</html>
